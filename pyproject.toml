[project]
name = "graphiant_sdk"
version = "26.5.0"
description = "Graphiant APIs"
authors = [
  {name = "OpenAPI Generator Community",email = "team@openapitools.org"},
]
readme = "README.md"
keywords = ["OpenAPI", "OpenAPI-Generator", "Graphiant APIs"]
requires-python = ">=3.10"

dependencies = [
  "urllib3 (>=2.1.0,<3.0.0)",
  "python-dateutil (>=2.8.2)",
  "pydantic (>=2.11)",
  "typing-extensions (>=4.7.1)",
  "typer (>=0.9,<1)",
  "shellingham (>=1.3.0)",
  "rich (>=13,<15)",
  "pygments (>=2.20,<3)",
  "playwright (>=1.40,<2)",
]

[project.scripts]
graphiant = "graphiant_cli.main:main"

[project.urls]
Repository = "https://github.com/Graphiant-Inc/graphiant-sdk-python"

[tool.poetry]
requires-poetry = ">=2.0"

[tool.poetry.group.dev.dependencies]
pytest = ">= 9.0.3"
pytest-cov = ">= 2.8.1"
tox = ">= 3.9.0"
flake8 = ">= 4.0.0"
types-python-dateutil = ">= 2.8.19.14"
mypy = ">= 1.5"
filelock = ">=3.20.3"


[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.pylint.'MESSAGES CONTROL']
extension-pkg-whitelist = "pydantic"

[tool.mypy]
files = [
  "graphiant_sdk",
  #"test",  # auto-generated tests
  "tests", # hand-written tests
]
# Skip generated models and API file — too large and not hand-maintained
exclude = [
  "graphiant_sdk/models/",
  "graphiant_sdk/api/default_api\\.py",
  "graphiant_sdk/__init__\\.py",
]
# TODO: enable "strict" once all these individual checks are passing
# strict = true

# List from: https://mypy.readthedocs.io/en/stable/existing_code.html#introduce-stricter-options
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true

## Getting these passing should be easy
strict_equality = true
extra_checks = true

## Strongly recommend enabling this one as soon as you can
check_untyped_defs = true

## These shouldn't be too much additional work, but may be tricky to
## get passing if you use a lot of untyped libraries
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_any_generics = true

### These next few are various gradations of forcing use of type annotations
#disallow_untyped_calls = true
#disallow_incomplete_defs = true
#disallow_untyped_defs = true
#
### This one isn't too hard to get passing, but return on investment is lower
#no_implicit_reexport = true
#
### This one can be tricky to get passing if you use a lot of untyped libraries
#warn_return_any = true

[[tool.mypy.overrides]]
module = [
  "graphiant_sdk.configuration",
]
warn_unused_ignores = true
strict_equality = true
extra_checks = true
check_untyped_defs = true
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_reexport = true
warn_return_any = true
