name: Lint SDK

on:
  pull_request:
    paths:
      - 'graphiant_sdk/**'
      - 'graphiant_cli/**'
      - 'test/**'
      - 'tests/**'
      - '.github/workflows/lint.yml'
      - 'requirements.txt'
      - 'test-requirements.txt'
      - 'pyproject.toml'
      - 'setup.py'
  push:
    branches:
      - main
      - develop
    paths:
      - 'graphiant_sdk/**'
      - 'graphiant_cli/**'
      - 'test/**'
      - 'tests/**'
      - '.github/workflows/lint.yml'
      - 'requirements.txt'
      - 'test-requirements.txt'
      - 'pyproject.toml'
      - 'setup.py'

permissions:
  contents: read

jobs:
  flake8:
    name: Flake8 Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Run flake8
        run: |
          # Fatal errors on hand-written code only (config in .flake8 excludes generated files)
          flake8 --count --select=E9,F63,F7,F82 --show-source --statistics \
            graphiant_cli/ \
            graphiant_sdk/api_client.py graphiant_sdk/configuration.py \
            graphiant_sdk/exceptions.py graphiant_sdk/rest.py graphiant_sdk/api_response.py \
            tests/
          # Style warnings across same set (non-fatal)
          flake8 --count --exit-zero --statistics \
            graphiant_cli/ \
            graphiant_sdk/api_client.py graphiant_sdk/configuration.py \
            graphiant_sdk/exceptions.py graphiant_sdk/rest.py graphiant_sdk/api_response.py \
            tests/

  mypy:
    name: MyPy Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Run mypy
        run: |
          mypy graphiant_sdk/
